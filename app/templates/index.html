<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <div class="layout">
    <main class="card">
      <h1>BMI Calculator</h1>
      <p>Enter your details to calculate BMI and ideal weight range.</p>

      <form
        id="bmi-form"
        method="post"
        action="/calculate"
        hx-post="/calculate"
        hx-target="#result"
        hx-swap="innerHTML"
        hx-indicator="#loading-indicator"
      >
        <label for="weight">Weight (kg)</label>
        <input
          id="weight"
          name="weight"
          type="number"
          min="1"
          step="0.1"
          value="{{ weight }}"
          required
          hx-post="/calculate"
          hx-target="#result"
          hx-swap="innerHTML"
          hx-include="#bmi-form"
          hx-trigger="input delay:120ms"
        />

        <input
          id="weight-slider"
          type="range"
          min="30"
          max="200"
          step="0.1"
          value="{{ weight }}"
          aria-label="Weight slider"
        />

        <label for="height">Height</label>
        <div class="height-row">
          <input
            id="height"
            name="height"
            type="number"
            min="1"
            step="0.1"
            value="{{ height }}"
            required
            hx-post="/calculate"
            hx-target="#result"
            hx-swap="innerHTML"
            hx-include="#bmi-form"
            hx-trigger="input delay:120ms"
          />
          <div class="unit-toggle" role="group" aria-label="Height unit">
            <input
              type="radio"
              id="unit-cm"
              name="height_unit"
              value="cm"
              {% if height_unit == "cm" %}checked{% endif %}
            />
            <label for="unit-cm">cm</label>
            <input
              type="radio"
              id="unit-in"
              name="height_unit"
              value="in"
              {% if height_unit == "in" %}checked{% endif %}
            />
            <label for="unit-in">in</label>
            <input
              type="radio"
              id="unit-ft"
              name="height_unit"
              value="ft"
              {% if height_unit == "ft" %}checked{% endif %}
            />
            <label for="unit-ft">ft</label>
          </div>
        </div>

        <input
          id="height-slider"
          type="range"
          min="100"
          max="220"
          step="0.1"
          value="{{ height }}"
          aria-label="Height slider"
        />

        <button type="submit">Calculate</button>
      </form>

      <div id="loading-indicator" class="htmx-indicator loading-spinner" style="display: none;">
        <div class="spinner"></div>
        <span>Calculating...</span>
      </div>

      <div id="result">
        {% include "partials/result.html" %}
      </div>

      <div class="bmi-formula">
        <h3>BMI formula</h3>
        <p>Body Mass Index is calculated as:</p>
        <p><strong>BMI = weight (kg) ÷ height (m)<sup>2</sup></strong></p>
      </div>
    </main>
  </div>

  <script>
    let bmiChart = null;

    const heightRanges = {
      cm: { min: 100, max: 220, step: 0.1 },
      in: { min: 39.4, max: 86.6, step: 0.1 },
      ft: { min: 3.3, max: 7.2, step: 0.01 },
    };

    let currentHeightUnit = null;

    function convertHeight(value, fromUnit, toUnit) {
      if (Number.isNaN(value)) {
        return NaN;
      }

      if (fromUnit === toUnit) {
        return value;
      }

      const conversions = {
        cm: {
          in: (v) => v / 2.54,
          ft: (v) => v / 30.48,
        },
        in: {
          cm: (v) => v * 2.54,
          ft: (v) => v / 12,
        },
        ft: {
          cm: (v) => v * 30.48,
          in: (v) => v * 12,
        },
      };

      return conversions[fromUnit]?.[toUnit]?.(value) ?? NaN;
    }

    function getActiveHeightUnit() {
      const checked = document.querySelector('input[name="height_unit"]:checked');
      return checked ? checked.value : "cm";
    }

    function updateHeightSlider(unit, heightValue) {
      const heightSlider = document.getElementById("height-slider");
      if (!heightSlider) {
        return;
      }

      const range = heightRanges[unit];
      heightSlider.min = range.min;
      heightSlider.max = range.max;
      heightSlider.step = range.step;

      if (!Number.isNaN(heightValue)) {
        const clamped = Math.max(range.min, Math.min(range.max, heightValue));
        heightSlider.value = clamped;
      }
    }

    function syncWeightControls() {
      const weightInput = document.getElementById("weight");
      const weightSlider = document.getElementById("weight-slider");

      if (!weightInput || !weightSlider) {
        return;
      }

      weightSlider.addEventListener("input", () => {
        weightInput.value = weightSlider.value;
        weightInput.dispatchEvent(new Event("input", { bubbles: true }));
      });

      weightInput.addEventListener("input", () => {
        weightSlider.value = weightInput.value || weightSlider.value;
      });
    }

    function setupHeightControls() {
      const heightInput = document.getElementById("height");
      const heightSlider = document.getElementById("height-slider");
      const heightRadios = Array.from(document.querySelectorAll('input[name="height_unit"]'));

      if (!heightInput || !heightSlider || heightRadios.length === 0) {
        return;
      }

      currentHeightUnit = getActiveHeightUnit();
      updateHeightSlider(currentHeightUnit, parseFloat(heightInput.value));

      heightInput.addEventListener("input", () => {
        if (!heightInput.value) {
          return;
        }
        heightSlider.value = heightInput.value;
      });

      heightSlider.addEventListener("input", () => {
        heightInput.value = heightSlider.value;
        heightInput.dispatchEvent(new Event("input", { bubbles: true }));
      });

      heightRadios.forEach((radio) => {
        radio.addEventListener("change", () => {
          if (!radio.checked) {
            return;
          }

          const newUnit = radio.value;
          const heightValue = parseFloat(heightInput.value);
          const convertedHeight = convertHeight(heightValue, currentHeightUnit, newUnit);

          currentHeightUnit = newUnit;
          updateHeightSlider(newUnit, convertedHeight);

          if (!Number.isNaN(convertedHeight)) {
            heightInput.value = convertedHeight.toFixed(2);
            heightInput.dispatchEvent(new Event("input", { bubbles: true }));
          }
        });
      });
    }

    function renderBmiChart() {
      const chartBox = document.querySelector("#result [data-bmi]");

      if (!chartBox) {
        if (bmiChart) {
          bmiChart.destroy();
          bmiChart = null;
        }
        return;
      }

      const bmi = parseFloat(chartBox.dataset.bmi);
      const canvas = document.getElementById("bmi-chart");

      if (!canvas || Number.isNaN(bmi)) {
        return;
      }

      // Load Chart.js dynamically if not already loaded
      if (typeof Chart === 'undefined') {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js';
        script.onload = () => createChart(bmi, canvas);
        document.head.appendChild(script);
      } else {
        createChart(bmi, canvas);
      }
    }

    function createChart(bmi, canvas) {
      const markerX = Math.max(0, Math.min(25, bmi - 15));

      if (bmiChart) {
        bmiChart.destroy();
      }

      bmiChart = new Chart(canvas, {
        data: {
          labels: ["Scale"],
          datasets: [
            {
              type: "bar",
              label: "Underweight",
              data: [3.5],
              backgroundColor: "#fecaca",
              borderWidth: 0,
              stack: "bmi",
              barThickness: 20,
            },
            {
              type: "bar",
              label: "Normal",
              data: [6.4],
              backgroundColor: "#86efac",
              borderWidth: 0,
              stack: "bmi",
              barThickness: 20,
            },
            {
              type: "bar",
              label: "Overweight",
              data: [5.0],
              backgroundColor: "#fde68a",
              borderWidth: 0,
              stack: "bmi",
              barThickness: 20,
            },
            {
              type: "bar",
              label: "Obesity",
              data: [10.1],
              backgroundColor: "#fca5a5",
              borderWidth: 0,
              stack: "bmi",
              barThickness: 20,
            },
            {
              type: "scatter",
              label: "Your BMI",
              data: [{ x: markerX, y: "Scale" }],
              backgroundColor: "#111827",
              borderColor: "#111827",
              pointRadius: 7,
              pointHoverRadius: 7,
              pointStyle: "triangle",
              rotation: 180,
              order: 0,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          devicePixelRatio: 2,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (context) => {
                  if (context.dataset.type === "scatter") {
                    return `Your BMI: ${bmi.toFixed(1)}`;
                  }
                  return `${context.dataset.label}`;
                },
              },
            },
          },
          indexAxis: "y",
          scales: {
            x: {
              stacked: true,
              min: 0,
              max: 25,
              title: {
                display: true,
                text: "BMI Scale (15 to 40)",
              },
              ticks: {
                callback: (value) => (Number(value) + 15).toFixed(0),
              },
            },
            y: {
              stacked: true,
              grid: { display: false },
              ticks: { display: false },
            },
          },
        },
      });
    }

    function setupConverter() {
      const cmInput = document.getElementById("conv-cm");
      const inInput = document.getElementById("conv-in");
      const ftInput = document.getElementById("conv-ft");

      if (!cmInput || !inInput || !ftInput) {
        return;
      }

      let isUpdating = false;

      const updateFromCm = (value) => {
        if (isUpdating) return;
        isUpdating = true;
        const cm = parseFloat(value);
        if (Number.isNaN(cm) || value === "") {
          inInput.value = "";
          ftInput.value = "";
        } else {
          inInput.value = (cm / 2.54).toFixed(2);
          ftInput.value = (cm / 30.48).toFixed(2);
        }
        isUpdating = false;
      };

      const updateFromIn = (value) => {
        if (isUpdating) return;
        isUpdating = true;
        const inches = parseFloat(value);
        if (Number.isNaN(inches) || value === "") {
          cmInput.value = "";
          ftInput.value = "";
        } else {
          cmInput.value = (inches * 2.54).toFixed(2);
          ftInput.value = (inches / 12).toFixed(2);
        }
        isUpdating = false;
      };

      const updateFromFt = (value) => {
        if (isUpdating) return;
        isUpdating = true;
        const feet = parseFloat(value);
        if (Number.isNaN(feet) || value === "") {
          cmInput.value = "";
          inInput.value = "";
        } else {
          cmInput.value = (feet * 30.48).toFixed(2);
          inInput.value = (feet * 12).toFixed(2);
        }
        isUpdating = false;
      };

      cmInput.addEventListener("input", (event) => updateFromCm(event.target.value));
      inInput.addEventListener("input", (event) => updateFromIn(event.target.value));
      ftInput.addEventListener("input", (event) => updateFromFt(event.target.value));
    }

    document.addEventListener("DOMContentLoaded", () => {
      syncWeightControls();
      setupHeightControls();
      renderBmiChart();
    });

    document.body.addEventListener("htmx:afterSwap", (event) => {
      if (event.detail.target && event.detail.target.id === "result") {
        renderBmiChart();
      }
    });
  </script>
</body>
</html>
